proxy_cache_path /var/cache/nginx/beskar-covers
  levels=1:2
  keys_zone=beskar_covers:20m
  max_size=512m
  inactive=30d
  use_temp_path=off;

# Standard WebSocket upgrade map: only forward Connection: upgrade for actual
# Upgrade requests; otherwise let nginx use its keep-alive default.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 4173;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Robots-Tag "noindex, nofollow" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

  # SPA: no-cache on HTML so SW detects new deploys
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Hashed assets: long cache
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # ES module workers (e.g. pdf.js's pdf.worker.min-*.mjs) must be served as
  # JavaScript. nginx's default mime.types does not map .mjs, so without this
  # override the browser gets application/octet-stream and refuses to execute
  # the module, breaking the PDF viewer ("Could not load PDF.").
  location ~ \.mjs$ {
    default_type application/javascript;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Manifest + SW: no cache
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    default_type application/manifest+json;
  }

  # ABS cover images: proxy + long browser cache (covers rarely change)
  location ~ ^/abs/api/items/[^/]+/cover {
    rewrite ^/abs/?(.*)$ /$1 break;
    proxy_pass ${ABS_UPSTREAM};
    proxy_cache beskar_covers;
    proxy_cache_key "$proxy_host$uri";
    proxy_cache_lock on;
    proxy_cache_background_update on;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_valid 200 30d;
    proxy_cache_valid 404 5m;
    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Set-Cookie;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_ssl_server_name on;
    add_header X-Cache-Status $upstream_cache_status always;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # ABS proxy (REST + Socket.IO WebSocket via /abs/socket.io/)
  location /abs/ {
    rewrite ^/abs/?(.*)$ /$1 break;
    proxy_pass ${ABS_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_ssl_server_name on;
    proxy_buffering off;
    proxy_read_timeout 86400s;
    client_max_body_size 0;
  }
}
